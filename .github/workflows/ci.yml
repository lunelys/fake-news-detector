name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install base requirements
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements_app.txt ]; then pip install -r requirements_app.txt; fi
          if [ -f bluesky-pipeline/requirements.txt ]; then pip install -r bluesky-pipeline/requirements.txt; fi

      - name: Lint (compile)
        run: |
          python -m compileall src bluesky-pipeline/src apps

      - name: Tests (if present)
        run: |
          if [ -d "bluesky-pipeline/tests" ]; then pytest bluesky-pipeline/tests -q; else echo "No tests to run."; fi
